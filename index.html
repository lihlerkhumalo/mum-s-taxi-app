<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mum's Taxi App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🚕 Mum's Taxi Calculator</h1>
    <form>
      <label class="labels" for="amount">Monthly Budget (R):</label><br/>
      <input class="inputs" type="number" id="amount" placeholder="e.g. 2200" /><br/><br/>

      <label class="labels" for="days">Number of Days:</label><br/>
      <input class="inputs" type="number" id="days" placeholder="e.g. 10" /><br/><br/>

      <button id="go">Calculate</button>
      <button type="reset">Reset</button>
    </form>

    <div id="output"></div>
    <br/> <br/>
  
<script src ="index.js"></script>
<footer>Coded by Langelihle khumalo </footer>
</div>
</body>
</html>
